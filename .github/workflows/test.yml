name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cli-tests:
    name: CLI Tests (Node.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test

  swift-tests:
    name: macOS App Tests (Swift)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build
        working-directory: macos
        run: swift build
      - name: Test
        working-directory: macos
        run: swift test

  dashboard-build:
    name: Dashboard Build (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: Install
        working-directory: dashboard
        run: npm ci
      - name: Build
        working-directory: dashboard
        run: npm run build
